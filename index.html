
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nabhan's Birds | Live Stats</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --silver: #C0C0C0;
            --gold: #F5C842;
            --yt-red: #FF0000;
            --bg: #050505;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .sky { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%); z-index: -1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .container { perspective: 1000px; }
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px 40px;
            width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transition: transform 0.1s ease;
        }

        .avatar-box { position: relative; width: 120px; height: 120px; margin: 0 auto 25px; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--silver); padding: 5px; }
        .silver-badge { position: absolute; bottom: 5px; right: 5px; background: #bdc3c7; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; }

        h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-style: italic; background: linear-gradient(to right, #fff, var(--silver)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .handle { color: var(--silver); font-size: 14px; letter-spacing: 2px; margin-bottom: 25px; display: block; }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-card { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .stat-val { font-size: 20px; font-weight: 800; }
        .stat-label { font-size: 10px; color: var(--silver); text-transform: uppercase; }

        .goal-box { text-align: left; margin-bottom: 35px; }
        .goal-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #7f8c8d, #ecf0f1, #bdc3c7); box-shadow: 0 0 15px var(--silver); transition: width 1.5s ease-in-out; }

        .sub-btn { background: white; color: black; text-decoration: none; padding: 18px; border-radius: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 800; transition: 0.3s; }
        .sub-btn:hover { background: var(--yt-red); color: white; transform: scale(1.05); }
        
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <div class="sky" id="sky"></div>

    <div class="container">
        <div class="card" id="tiltCard">
            <div class="avatar-box">
                <img id="chanImg" src="https://via.placeholder.com/120" class="avatar-img">
                <div class="silver-badge">🥈</div>
            </div>

            <h1 id="chanName">Loading...</h1>
            <span class="handle">@nabhans_crafts_ideas</span>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-val" id="subCount">---</div>
                    <div class="stat-label">Subscribers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="viewCount">---</div>
                    <div class="stat-label">Total Views</div>
                </div>
            </div>

            <div class="goal-box">
                <div class="goal-header">
                    <span>Road to Silver Play Button</span>
                    <span id="percentText">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="fill"></div>
                </div>
                <p style="font-size: 11px; color: #888; margin-top: 10px;">Goal: 100,000 Subs</p>
            </div>

            <a href="https://www.youtube.com/channel/UCV6XeVyyYqKettwhHXb7cbg?sub_confirmation=1" target="_blank" class="sub-btn" onclick="celebrate()">
                SUBSCRIBE NOW
            </a>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyCx967o-Rb3BPOLgkhIXOHVZeni0ak742o';
        const CHANNEL_ID = 'UCV6XeVyyYqKettwhHXb7cbg';

        async function fetchStats() {
            try {
                const response = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&id=${CHANNEL_ID}&key=${API_KEY}`);
                const data = await response.json();
                const stats = data.items[0].statistics;
                const snippet = data.items[0].snippet;

                // Update UI
                document.getElementById('chanName').innerText = snippet.title;
                document.getElementById('chanImg').src = snippet.thumbnails.medium.url;
                
                const subs = parseInt(stats.subscriberCount);
                const views = parseInt(stats.viewCount);

                document.getElementById('subCount').innerText = subs.toLocaleString();
                document.getElementById('viewCount').innerText = (views / 1000).toFixed(1) + "K";

                // Calculate Progress (Target 100,000)
                const target = 100000;
                const percent = (subs / target * 100).toFixed(2);
                
                document.getElementById('percentText').innerText = percent + "%";
                document.getElementById('fill').style.width = percent + "%";

            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('chanName').innerText = "Nabhan's Birds";
            }
        }

        // Run on load
        fetchStats();

        // 3D Tilt Effect
        const card = document.getElementById('tiltCard');
        document.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 25;
            let y = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });

        function celebrate() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#C0C0C0', '#ffffff', '#FF0000'] });
        }

        // Stars
        const sky = document.getElementById('sky');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random() * 3 + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            sky.appendChild(star);
        }
    </script>
</body>
</html>
