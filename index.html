
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nabhan's Birds | Live Stats</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --silver: #C0C0C0;
            --gold: #F5C842;
            --yt-red: #FF0000;
            --bg: #050505;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Ambient Background */
        .sky { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%); z-index: -1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* Flying Elements - Spread in all areas */
        .flying-short {
            position: absolute;
            z-index: 1;
            cursor: pointer;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.15);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s;
            object-fit: cover;
            opacity: 0.7;
        }
        .flying-short:hover {
            transform: scale(1.3) !important;
            opacity: 1;
            border-color: var(--yt-red);
            z-index: 100;
        }

        /* Main Dashboard Card */
        .container { perspective: 1000px; z-index: 50; }
        .card {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px 40px;
            width: 420px;
            text-align: center;
            box-shadow: 0 25px 80px rgba(0,0,0,0.9);
            transition: transform 0.1s ease-out;
        }

        .avatar-box { position: relative; width: 130px; height: 130px; margin: 0 auto 25px; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--silver); padding: 5px; background: #111; }
        .silver-badge { position: absolute; bottom: 5px; right: 5px; background: #bdc3c7; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; font-size: 18px; }

        h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900; font-style: italic; background: linear-gradient(to right, #fff, var(--silver)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .handle { color: var(--silver); font-size: 14px; letter-spacing: 2px; margin-bottom: 30px; display: block; opacity: 0.8; }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 35px; }
        .stat-card { background: rgba(255, 255, 255, 0.05); padding: 20px 10px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.08); }
        .stat-val { font-size: 24px; font-weight: 800; color: #fff; }
        .stat-label { font-size: 11px; color: var(--silver); text-transform: uppercase; margin-top: 5px; letter-spacing: 1px; }

        .goal-box { text-align: left; margin-bottom: 40px; }
        .goal-header { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 13px; font-weight: 600; color: var(--silver); }
        .progress-bar { height: 10px; background: rgba(255,255,255,0.05); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #7f8c8d, #fff, #bdc3c7); box-shadow: 0 0 20px rgba(192, 192, 192, 0.5); transition: width 2s cubic-bezier(0.22, 1, 0.36, 1); }

        .sub-btn { background: #fff; color: #000; text-decoration: none; padding: 20px; border-radius: 30px; display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: 800; font-size: 16px; transition: 0.4s; border: none; cursor: pointer; width: 100%; }
        .sub-btn:hover { background: var(--yt-red); color: white; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255, 0, 0, 0.3); }
    </style>
</head>
<body>
    <div class="sky" id="sky"></div>
    
    <div class="container">
        <div class="card" id="tiltCard">
            <div class="avatar-box">
                <img id="chanImg" src="https://via.placeholder.com/130" class="avatar-img">
                <div class="silver-badge">🥈</div>
            </div>
            <h1 id="chanName">Nabhan's Birds</h1>
            <span class="handle">@nabhans_crafts_ideas</span>
            
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-val" id="subCount">0</div>
                    <div class="stat-label">Subscribers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="viewCount">0</div>
                    <div class="stat-label">Total Views</div>
                </div>
            </div>

            <div class="goal-box">
                <div class="goal-header">
                    <span>Road to Silver Button</span>
                    <span id="percentText">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="fill"></div>
                </div>
                <p style="font-size: 11px; color: #666; margin-top: 10px; text-align: center;">Target: 100,000 Subscribers</p>
            </div>

            <a href="https://www.youtube.com/channel/UCV6XeVyyYqKettwhHXb7cbg?sub_confirmation=1" target="_blank" class="sub-btn" onclick="celebrate()">
                SUBSCRIBE NOW
            </a>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const API_KEY = 'AIzaSyCx967o-Rb3BPOLgkhIXOHVZeni0ak742o'; 
        const CHANNEL_ID = 'UCV6XeVyyYqKettwhHXb7cbg';

        async function init() {
            fetchStats();
            fetchVideos();
            createStars();
        }

        async function fetchStats() {
            try {
                const response = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&id=${CHANNEL_ID}&key=${API_KEY}`);
                const data = await response.json();
                if (!data.items) return;

                const stats = data.items[0].statistics;
                const snippet = data.items[0].snippet;

                document.getElementById('chanName').innerText = snippet.title;
                document.getElementById('chanImg').src = snippet.thumbnails.high.url;
                
                const subs = parseInt(stats.subscriberCount);
                const views = parseInt(stats.viewCount);
                
                document.getElementById('subCount').innerText = subs.toLocaleString();
                document.getElementById('viewCount').innerText = views > 1000000 ? (views / 1000000).toFixed(1) + "M" : (views / 1000).toFixed(0) + "K";

                const target = 100000;
                const percent = Math.min((subs / target * 100), 100).toFixed(2);
                document.getElementById('percentText').innerText = percent + "%";
                document.getElementById('fill').style.width = percent + "%";
            } catch (error) {
                console.error("Stats Error:", error);
            }
        }

        async function fetchVideos() {
            try {
                // Gets up to 50 latest videos/shorts
                const response = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=40&type=video`);
                const data = await response.json();
                
                if (data.items) {
                    data.items.forEach((item, index) => {
                        // Delay creation slightly for a "pop-in" effect spread across time
                        setTimeout(() => {
                            createFlyingShort(item.id.videoId, item.snippet.thumbnails.medium.url);
                        }, index * 200);
                    });
                }
            } catch (e) {
                console.log("Videos fetch failed");
            }
        }

        function createFlyingShort(id, thumbUrl) {
            const img = document.createElement('img');
            img.src = thumbUrl;
            img.className = 'flying-short';
            
            // Initial Random Placement (Spread in ALL areas)
            const size = Math.random() * 100 + 70; 
            img.style.width = size + 'px';
            img.style.height = (size * 1.5) + 'px'; 
            
            let posX = Math.random() * (window.innerWidth - size);
            let posY = Math.random() * (window.innerHeight - (size * 1.5));
            
            // Movement physics
            let velX = (Math.random() - 0.5) * 0.6;
            let velY = (Math.random() - 0.5) * 0.6;
            let rot = Math.random() * 360;
            let rotSpeed = (Math.random() - 0.5) * 0.2;

            function animate() {
                posX += velX;
                posY += velY;
                rot += rotSpeed;

                // Bounce Logic
                if (posX <= 0 || posX >= window.innerWidth - size) velX *= -1;
                if (posY <= 0 || posY >= window.innerHeight - (size * 1.5)) velY *= -1;

                img.style.left = posX + 'px';
                img.style.top = posY + 'px';
                img.style.transform = `rotate(${rot}deg)`;

                requestAnimationFrame(animate);
            }

            img.onclick = () => window.open(`https://www.youtube.com/watch?v=${id}`, '_blank');
            document.body.appendChild(img);
            animate();
        }

        function createStars() {
            const sky = document.getElementById('sky');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = star.style.height = Math.random() * 2 + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 5 + 's';
                sky.appendChild(star);
            }
        }

        // Interactive 3D Tilt
        const card = document.getElementById('tiltCard');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 30;
            const y = (window.innerHeight / 2 - e.pageY) / 30;
            card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });

        function celebrate() {
            confetti({ 
                particleCount: 150, 
                spread: 70, 
                origin: { y: 0.6 }, 
                colors: ['#C0C0C0', '#ffffff', '#FF0000', '#000000'] 
            });
        }

        init();
    </script>
</body>
</html>
